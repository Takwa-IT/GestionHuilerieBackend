spring.application.name=GestionHuilerieBack

spring.datasource.url=jdbc:mysql://localhost:3306/gestionhuilerie?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.docker.compose.enabled=false

server.port=8000
app.storage.bon-pesee-dir=
ai.prediction.base-url=${AI_PREDICTION_BASE_URL:http://localhost:7500}

# JWT defaults for local/dev startup (can be overridden by env vars)
security.jwt.secret=${JWT_SECRET:mySuperSecretKeyThatIsVeryLongAndSecureForJWTTokenGeneration2026ForOilProductionSystemSecurity}
security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
security.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}
