spring.application.name=GestionHuilerieBack

# Testcontainers MySQL
spring.datasource.url=jdbc:tc:mysql:8.0:///gestionhuilerie?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
security.jwt.secret=testSecretKeyForIntegrationTests2026
security.jwt.expiration-ms=3600000
security.jwt.refresh-expiration-ms=7200000

# Python Prediction (WireMock)
ai.prediction.base-url=http://localhost:8089

# Mail (désactivé pour tests)
spring.mail.host=localhost
spring.mail.port=2525

# Server
server.port=0

# Logging
logging.level.org.hibernate.SQL=INFO
logging.level.org.example.gestionhuilerieback=DEBUG
