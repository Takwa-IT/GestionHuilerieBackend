spring.application.name=GestionHuilerieBack

# H2 Database for E2E tests
spring.datasource.url=jdbc:h2:mem:testdb-e2e;DB_CLOSE_DELAY=-1;MODE=MySQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JWT
security.jwt.secret=testSecretKeyForIntegrationTests2026MustBeAtLeast256BitsLong
security.jwt.expiration-ms=3600000
security.jwt.refresh-expiration-ms=7200000

# Python Prediction - REAL SERVICE for E2E tests
ai.prediction.base-url=http://localhost:7500

# Mail (désactivé pour tests)
spring.mail.host=localhost
spring.mail.port=2525
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false

# Email verification disabled for tests
app.email.verification.enabled=false
app.email.verification.required=false

# Logging - reduce verbosity for cleaner output
logging.level.org.hibernate.SQL=WARN
logging.level.org.example.gestionhuilerieback=INFO
